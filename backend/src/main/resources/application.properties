# ================================================
# Application
# ================================================
spring.application.name=malva_pastry_shop
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ================================================
# Server
# ================================================
server.port=${SERVER_PORT:8080}

# ================================================
# Database - PostgreSQL
# ================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/malva_pastry_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================================
# JPA / Hibernate
# ================================================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
# Deshabilitar open-in-view para replicar comportamiento de produccion
# Esto cierra la sesion Hibernate al terminar el servicio (igual que en Render)
spring.jpa.open-in-view=false

# ================================================
# Thymeleaf
# ================================================
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ================================================
# Static Resources
# ================================================
spring.web.resources.static-locations=classpath:/static/
spring.web.resources.cache.period=0

# ================================================
# CORS
# ================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# ================================================
# OpenAPI / Swagger
# ================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=com.malva_pastry_shop.backend.controller.api
springdoc.paths-to-match=/api/v1/**

# ================================================
# Flyway deshabilitado en dev — Hibernate crea el schema con ddl-auto=create
# ================================================
spring.flyway.enabled=false

# ================================================
# Logging
# ================================================
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.com.malva_pastry_shop=${LOG_LEVEL_APP:DEBUG}
